<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Knights — Nav Style 1 · Overlay curtain</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root{--paper:#ECE6DD;--ink:#1A1A1A;--clay:#583939;--taupe:#B3A696;--sage:#657B69}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Space Grotesk',sans-serif;background:var(--paper);color:var(--ink);min-height:100svh;overflow-x:hidden}
  em{font-family:'Fraunces',serif;font-style:italic;font-weight:400}
  a{color:inherit;text-decoration:none}
  header{position:fixed;top:0;left:0;width:100%;z-index:60;display:flex;justify-content:space-between;align-items:center;padding:1.5rem clamp(1rem,2.5vw,2.5rem)}
  .brand{font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:.95rem;transition:color .4s}
  .toggle{display:inline-flex;align-items:center;gap:.65rem;background:none;border:0;cursor:pointer;font:inherit;color:inherit;letter-spacing:.14em;text-transform:uppercase;font-size:.78rem;position:relative}
  .toggle .bars{width:26px;height:10px;position:relative}
  .toggle .bars i{position:absolute;left:0;right:0;height:1.5px;background:currentColor;transition:transform .5s cubic-bezier(.7,0,.2,1),top .5s cubic-bezier(.7,0,.2,1)}
  .toggle .bars i:nth-child(1){top:0}.toggle .bars i:nth-child(2){top:8px}
  .toggle .lbl-close{display:none}
  /* full-screen clay overlay, wipes down */
  .overlay{position:fixed;inset:0;z-index:55;background:var(--clay);color:var(--paper);
    clip-path:inset(0 0 100% 0);transition:clip-path .8s cubic-bezier(.76,0,.24,1);
    display:flex;flex-direction:column;justify-content:center;padding:16vh clamp(1.5rem,6vw,7rem) 10vh}
  .menu{list-style:none}
  .menu li{overflow:hidden}
  .menu li a{display:flex;align-items:baseline;gap:1.1rem;font-weight:500;text-transform:uppercase;
    font-size:clamp(2.4rem,9vw,7rem);line-height:1.08;letter-spacing:-.01em;color:var(--paper);
    transform:translateY(110%);transition:transform .7s cubic-bezier(.22,1,.36,1),color .35s}
  .menu li a:hover{color:var(--taupe)}
  .menu li .idx{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:.26em;opacity:.55}
  .meta{margin-top:7vh;display:flex;flex-wrap:wrap;gap:1rem 2.5rem;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;opacity:0;transition:opacity .6s .3s}
  /* open state */
  html.nav-open .overlay{clip-path:inset(0 0 0 0)}
  html.nav-open .menu li a{transform:translateY(0)}
  html.nav-open .menu li:nth-child(1) a{transition-delay:.30s}
  html.nav-open .menu li:nth-child(2) a{transition-delay:.38s}
  html.nav-open .menu li:nth-child(3) a{transition-delay:.46s}
  html.nav-open .menu li:nth-child(4) a{transition-delay:.54s}
  html.nav-open .meta{opacity:.85}
  html.nav-open .brand,html.nav-open .toggle{color:var(--paper)}
  html.nav-open .toggle .bars i:nth-child(1){top:4px;transform:rotate(45deg)}
  html.nav-open .toggle .bars i:nth-child(2){top:4px;transform:rotate(-45deg)}
  html.nav-open .toggle .lbl-open{display:none}html.nav-open .toggle .lbl-close{display:inline}
  /* faux hero behind, for context */
  .hero{height:100svh;display:flex;align-items:center;padding:0 clamp(1.5rem,6vw,7rem)}
  .hero h1{font-weight:700;text-transform:uppercase;font-size:clamp(2rem,6vw,5.5rem);line-height:1.04;max-width:14ch}
  .hero h1 em{text-transform:none;color:var(--clay)}
  @media (prefers-reduced-motion:reduce){*{transition-duration:.001s!important}}
</style></head>
<body>
  <header>
    <a class="brand" href="#">Knights</a>
    <button class="toggle" id="toggle" aria-expanded="false" aria-controls="overlay">
      <span class="lbl-open">Menu</span><span class="lbl-close">Close</span>
      <span class="bars" aria-hidden="true"><i></i><i></i></span>
    </button>
  </header>

  <nav class="overlay" id="overlay" aria-hidden="true">
    <ul class="menu">
      <li><a href="#"><span class="idx">01</span>Projects</a></li>
      <li><a href="#"><span class="idx">02</span>About</a></li>
      <li><a href="#"><span class="idx">03</span>Contact</a></li>
      <li><a href="#"><span class="idx">04</span>Enquire</a></li>
    </ul>
    <div class="meta"><span>enquiries@knightsdevelopments.com</span><span>Marlow · Amersham · Seer Green</span></div>
  </nav>

  <section class="hero"><h1>Unique <em>luxury</em> homes in the Buckinghamshire countryside</h1></section>

  <script>
    const root=document.documentElement,t=document.getElementById('toggle'),ov=document.getElementById('overlay');
    const set=o=>{root.classList.toggle('nav-open',o);t.setAttribute('aria-expanded',o);ov.setAttribute('aria-hidden',!o);};
    t.addEventListener('click',()=>set(!root.classList.contains('nav-open')));
    document.addEventListener('keydown',e=>{if(e.key==='Escape')set(false);});
    ov.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>set(false)));
  </script>
  <script src="../../js/cursor.js"></script>
</body></html>
