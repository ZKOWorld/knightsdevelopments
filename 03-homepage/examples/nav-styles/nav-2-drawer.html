<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Knights — Nav Style 2 · Index drawer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root{--paper:#ECE6DD;--ink:#1A1A1A;--clay:#583939;--taupe:#B3A696;--sage:#657B69}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Space Grotesk',sans-serif;background:var(--paper);color:var(--ink);min-height:100svh;overflow-x:hidden}
  em{font-family:'Fraunces',serif;font-style:italic;font-weight:400}
  a{color:inherit;text-decoration:none}
  header{position:fixed;top:0;left:0;width:100%;z-index:60;display:flex;justify-content:space-between;align-items:center;padding:1.5rem clamp(1rem,2.5vw,2.5rem)}
  .brand{font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:.95rem}
  .toggle{display:inline-flex;align-items:center;gap:.65rem;background:none;border:0;cursor:pointer;font:inherit;color:inherit;letter-spacing:.14em;text-transform:uppercase;font-size:.78rem;position:relative}
  .toggle .bars{width:26px;height:10px;position:relative}
  .toggle .bars i{position:absolute;left:0;right:0;height:1.5px;background:currentColor;transition:transform .5s cubic-bezier(.7,0,.2,1),top .5s cubic-bezier(.7,0,.2,1)}
  .toggle .bars i:nth-child(1){top:0}.toggle .bars i:nth-child(2){top:8px}
  .toggle .lbl-close{display:none}
  html.nav-open .toggle .bars i:nth-child(1){top:4px;transform:rotate(45deg)}
  html.nav-open .toggle .bars i:nth-child(2){top:4px;transform:rotate(-45deg)}
  html.nav-open .toggle .lbl-open{display:none}html.nav-open .toggle .lbl-close{display:inline}
  .scrim{position:fixed;inset:0;z-index:54;background:rgba(26,26,26,.32);opacity:0;visibility:hidden;transition:opacity .6s,visibility .6s}
  html.nav-open .scrim{opacity:1;visibility:visible}
  .drawer{position:fixed;top:0;right:0;height:100svh;width:min(460px,88vw);z-index:56;background:var(--paper);
    box-shadow:-30px 0 80px rgba(26,26,26,.13);transform:translateX(100%);transition:transform .75s cubic-bezier(.76,0,.24,1);
    display:flex;flex-direction:column;padding:7vh clamp(1.5rem,3vw,2.6rem) 4vh}
  html.nav-open .drawer{transform:translateX(0)}
  .preview{position:relative;aspect-ratio:4/3;background:#d8d0c4;overflow:hidden;margin-bottom:2.2rem}
  .preview img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s ease}
  .preview img.show{opacity:1}
  .preview .label{position:absolute;left:1rem;bottom:.8rem;color:var(--paper);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;text-shadow:0 1px 8px rgba(0,0,0,.5)}
  .idxlist{list-style:none}
  .idxlist li{border-top:1px solid rgba(88,57,57,.18)}
  .idxlist li:last-child{border-bottom:1px solid rgba(88,57,57,.18)}
  .idxlist li a{display:flex;justify-content:space-between;align-items:baseline;gap:1rem;padding:.7rem 0;
    font-family:'Fraunces',serif;font-weight:300;font-size:clamp(1.6rem,4.5vw,2.3rem);color:var(--taupe);
    transition:color .35s,padding-left .45s cubic-bezier(.7,0,.2,1)}
  .idxlist li a:hover{color:var(--ink);padding-left:.6rem}
  .idxlist li .loc{font-family:'Space Grotesk',sans-serif;font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--clay);opacity:0;transition:opacity .35s}
  .idxlist li a:hover .loc{opacity:.85}
  .dfoot{margin-top:auto;padding-top:2rem;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--clay);line-height:2}
  .hero{height:100svh;display:flex;align-items:center;padding:0 clamp(1.5rem,6vw,7rem)}
  .hero h1{font-weight:700;text-transform:uppercase;font-size:clamp(2rem,6vw,5.5rem);line-height:1.04;max-width:14ch}
  .hero h1 em{text-transform:none;color:var(--clay)}
  @media (prefers-reduced-motion:reduce){*{transition-duration:.001s!important}}
</style></head>
<body>
  <header>
    <a class="brand" href="#">Knights</a>
    <button class="toggle" id="toggle" aria-expanded="false" aria-controls="drawer">
      <span class="lbl-open">Menu</span><span class="lbl-close">Close</span>
      <span class="bars" aria-hidden="true"><i></i><i></i></span>
    </button>
  </header>

  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <figure class="preview" id="preview">
      <img data-k="projects" src="../img/huxley-hall.jpg" alt="" class="show">
      <img data-k="about" src="../img/great-meadow.jpg" alt="">
      <img data-k="contact" src="../img/maplebrook.jpg" alt="">
      <img data-k="enquire" src="../img/willows.jpg" alt="">
      <figcaption class="label" id="plabel">Selected developments</figcaption>
    </figure>
    <ul class="idxlist">
      <li><a href="#" data-k="projects">Projects<span class="loc">15 developments</span></a></li>
      <li><a href="#" data-k="about">About<span class="loc">The studio</span></a></li>
      <li><a href="#" data-k="contact">Contact<span class="loc">Buckinghamshire</span></a></li>
      <li><a href="#" data-k="enquire">Enquire<span class="loc">Register interest</span></a></li>
    </ul>
    <div class="dfoot">enquiries@knightsdevelopments.com<br>Marlow · Amersham · Seer Green</div>
  </aside>

  <section class="hero"><h1>Unique <em>luxury</em> homes in the Buckinghamshire countryside</h1></section>

  <script>
    const root=document.documentElement,t=document.getElementById('toggle'),dr=document.getElementById('drawer'),sc=document.getElementById('scrim');
    const imgs=document.querySelectorAll('#preview img'),lab=document.getElementById('plabel');
    const labels={projects:'Selected developments',about:'Building since 2009',contact:'Get in touch',enquire:'Register your interest'};
    const set=o=>{root.classList.toggle('nav-open',o);t.setAttribute('aria-expanded',o);dr.setAttribute('aria-hidden',!o);};
    t.addEventListener('click',()=>set(!root.classList.contains('nav-open')));
    sc.addEventListener('click',()=>set(false));
    document.addEventListener('keydown',e=>{if(e.key==='Escape')set(false);});
    document.querySelectorAll('.idxlist a').forEach(a=>{
      a.addEventListener('mouseenter',()=>{const k=a.dataset.k;imgs.forEach(im=>im.classList.toggle('show',im.dataset.k===k));lab.textContent=labels[k]||'';});
      a.addEventListener('click',()=>set(false));
    });
  </script>
  <script src="../../js/cursor.js"></script>
</body></html>
