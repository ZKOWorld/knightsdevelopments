<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Knights — Nav Style 3 · Warm pill</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root{--paper:#ECE6DD;--ink:#1A1A1A;--clay:#583939;--taupe:#B3A696;--sage:#657B69}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Space Grotesk',sans-serif;background:var(--paper);color:var(--ink);min-height:100svh;overflow-x:hidden}
  em{font-family:'Fraunces',serif;font-style:italic;font-weight:400}
  a{color:inherit;text-decoration:none}
  header{position:fixed;top:0;left:0;width:100%;z-index:60;display:flex;justify-content:space-between;align-items:center;padding:1.5rem clamp(1rem,2.5vw,2.5rem)}
  .brand{font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:.95rem}
  .navpill{display:flex;align-items:center;gap:1.2rem}
  /* inline link row that unfurls via the grid-fr trick (collapses fully when closed) */
  .links{display:inline-grid;grid-template-columns:0fr;transition:grid-template-columns .6s cubic-bezier(.76,0,.24,1)}
  .links>div{overflow:hidden;min-width:0;display:flex;gap:1.7rem;padding-right:.2rem}
  html.nav-open .links{grid-template-columns:1fr}
  .links a{position:relative;white-space:nowrap;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;
    opacity:0;transform:translateY(6px);transition:opacity .4s,transform .4s,color .3s}
  .links a::after{content:'';position:absolute;left:0;bottom:-5px;width:100%;height:1px;background:var(--sage);transform:scaleX(0);transform-origin:left;transition:transform .4s cubic-bezier(.7,0,.2,1)}
  .links a:hover{color:var(--sage)}.links a:hover::after{transform:scaleX(1)}
  html.nav-open .links a{opacity:1;transform:none}
  html.nav-open .links a:nth-child(1){transition-delay:.18s}
  html.nav-open .links a:nth-child(2){transition-delay:.26s}
  html.nav-open .links a:nth-child(3){transition-delay:.34s}
  html.nav-open .links a:nth-child(4){transition-delay:.42s}
  .pill{background:var(--taupe);border:0;border-radius:999px;cursor:pointer;font:inherit;color:var(--ink);
    padding:.62rem 1.25rem;letter-spacing:.12em;text-transform:uppercase;font-size:.74rem;
    display:inline-flex;align-items:center;gap:.55rem;transition:background .4s,color .4s}
  html.nav-open .pill{background:var(--clay);color:var(--paper)}
  .pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor;transition:transform .5s}
  html.nav-open .pill .dot{transform:scale(1.7)}
  .pill .lbl-close{display:none}html.nav-open .pill .lbl-open{display:none}html.nav-open .pill .lbl-close{display:inline}
  .hero{height:100svh;display:flex;align-items:center;padding:0 clamp(1.5rem,6vw,7rem)}
  .hero h1{font-weight:700;text-transform:uppercase;font-size:clamp(2rem,6vw,5.5rem);line-height:1.04;max-width:14ch}
  .hero h1 em{text-transform:none;color:var(--clay)}
  /* mobile: links drop into a tidy taupe panel under the header */
  @media(max-width:680px){
    .links{position:fixed;top:70px;right:clamp(1rem,2.5vw,2.5rem);grid-template-columns:1fr;
      background:var(--taupe);border-radius:14px;overflow:hidden;max-height:0;transition:max-height .55s cubic-bezier(.76,0,.24,1)}
    .links>div{flex-direction:column;gap:0;padding:0}
    .links a{padding:.95rem 1.4rem;opacity:1;transform:none;font-size:.9rem;border-bottom:1px solid rgba(88,57,57,.16)}
    .links a::after{display:none}.links a:last-child{border-bottom:0}
    html.nav-open .links{max-height:340px}
  }
  @media (prefers-reduced-motion:reduce){*{transition-duration:.001s!important}}
</style></head>
<body>
  <header>
    <a class="brand" href="#">Knights</a>
    <nav class="navpill">
      <div class="links" id="links"><div>
        <a href="#">Projects</a><a href="#">About</a><a href="#">Contact</a><a href="#">Enquire</a>
      </div></div>
      <button class="pill" id="pill" aria-expanded="false" aria-controls="links">
        <span class="dot" aria-hidden="true"></span><span class="lbl-open">Menu</span><span class="lbl-close">Close</span>
      </button>
    </nav>
  </header>

  <section class="hero"><h1>Unique <em>luxury</em> homes in the Buckinghamshire countryside</h1></section>

  <script>
    const root=document.documentElement,p=document.getElementById('pill'),lk=document.getElementById('links');
    const set=o=>{root.classList.toggle('nav-open',o);p.setAttribute('aria-expanded',o);};
    p.addEventListener('click',()=>set(!root.classList.contains('nav-open')));
    document.addEventListener('keydown',e=>{if(e.key==='Escape')set(false);});
    lk.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>set(false)));
  </script>
</body></html>
