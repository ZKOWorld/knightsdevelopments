<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero 1 — Cinematic Fullscreen</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:ital,opsz,wght@1,9..144,300;0,9..144,400&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F4F1EA;--ink:#1A1A1A;--clay:#583939}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Space Grotesk',sans-serif;background:#000;color:#fff;overflow-x:hidden}
  em{font-family:'Fraunces',serif;font-style:italic;font-weight:300}

  /* loader */
  .loader{position:fixed;inset:0;z-index:99;background:#1A1A1A;display:flex;align-items:center;justify-content:center;
    animation:lift 1s ease 1.6s forwards}
  .loader span{font-weight:700;letter-spacing:.4em;font-size:.9rem;color:var(--paper);opacity:0;animation:fade .8s ease .3s forwards}
  @keyframes fade{to{opacity:1}}
  @keyframes lift{to{transform:translateY(-100%)}}

  /* hero */
  .hero{position:relative;height:100svh;width:100%;overflow:hidden}
  .slide{position:absolute;inset:0;opacity:0;transition:opacity 1.4s ease}
  .slide.on{opacity:1}
  .slide img{width:100%;height:100%;object-fit:cover;transform:scale(1.05);animation:ken 8s ease-in-out infinite alternate}
  @keyframes ken{to{transform:scale(1.16)}}
  .hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,.1) 35%,rgba(0,0,0,.55) 100%);z-index:2}

  header{position:fixed;top:0;left:0;width:100%;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:1.6rem clamp(1.25rem,4vw,4rem);color:#fff}
  .brand{font-weight:700;letter-spacing:.24em}
  nav{display:flex;gap:1.8rem;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase}

  .hero__content{position:absolute;z-index:5;left:clamp(1.25rem,4vw,4rem);bottom:clamp(2rem,9vh,7rem);right:clamp(1.25rem,4vw,4rem)}
  h1{font-weight:700;text-transform:uppercase;font-size:clamp(2.4rem,7vw,6.5rem);line-height:.98;max-width:16ch;text-shadow:0 2px 30px rgba(0,0,0,.3)}
  h1 .ln{display:block;overflow:hidden}
  h1 .ln span{display:block;transform:translateY(110%);animation:rise .9s cubic-bezier(.22,1,.36,1) forwards}
  h1 .ln:nth-child(1) span{animation-delay:1.7s}
  h1 .ln:nth-child(2) span{animation-delay:1.8s}
  h1 .ln:nth-child(3) span{animation-delay:1.9s}
  @keyframes rise{to{transform:translateY(0)}}
  .meta{display:flex;justify-content:space-between;align-items:flex-end;margin-top:2rem;border-top:1px solid rgba(255,255,255,.3);padding-top:1rem;opacity:0;animation:fade .8s ease 2.2s forwards}
  .meta__name{font-size:1.1rem;letter-spacing:.05em}
  .meta__loc{font-size:.85rem;letter-spacing:.12em;text-transform:uppercase;opacity:.85}
  .dots{display:flex;gap:.5rem}
  .dots b{width:28px;height:2px;background:rgba(255,255,255,.4);display:block;cursor:pointer;transition:background .3s}
  .dots b.on{background:#fff}
  .scroll{position:absolute;left:50%;bottom:1.4rem;transform:translateX(-50%);z-index:5;font-size:.7rem;letter-spacing:.3em;opacity:.8;animation:bob 2s ease infinite}
  @keyframes bob{50%{transform:translate(-50%,6px)}}
</style>
</head>
<body>
  <div class="loader"><span>KNIGHTS DEVELOPMENTS</span></div>

  <header>
    <div class="brand">KNIGHTS</div>
    <nav><a>Projects</a><a>About</a><a>Contact</a></nav>
  </header>

  <section class="hero">
    <div class="slide on"><img src="img/huxley-hall.jpg" alt=""></div>
    <div class="slide"><img src="img/maplebrook.jpg" alt=""></div>
    <div class="slide"><img src="img/great-meadow.jpg" alt=""></div>
    <div class="slide"><img src="img/old-tythe-barn.jpg" alt=""></div>

    <div class="hero__content">
      <h1><span class="ln"><span>Unique luxury homes</span></span><span class="ln"><span>in the <em>Buckinghamshire</em></span></span><span class="ln"><span>countryside</span></span></h1>
      <div class="meta">
        <div><div class="meta__name" id="pName">Huxley Hall</div><div class="meta__loc" id="pLoc">Marlow · Completion 2026</div></div>
        <div class="dots" id="dots"></div>
      </div>
    </div>
    <div class="scroll">SCROLL</div>
  </section>

<script>
  const data=[["Huxley Hall","Marlow · Completion 2026"],["Maplebrook Manor","Seer Green · Sold"],["Great Meadow Barn","Amersham"],["The Old Tythe Barn","Amersham"]];
  const slides=[...document.querySelectorAll('.slide')], dots=document.getElementById('dots');
  slides.forEach((_,i)=>{const b=document.createElement('b');if(i===0)b.className='on';b.onclick=()=>go(i);dots.appendChild(b)});
  let i=0;const D=[...dots.children];
  function go(n){slides[i].classList.remove('on');D[i].classList.remove('on');i=n;slides[i].classList.add('on');D[i].classList.add('on');
    document.getElementById('pName').textContent=data[i][0];document.getElementById('pLoc').textContent=data[i][1];}
  setInterval(()=>go((i+1)%slides.length),4500);
</script>
</body>
</html>
