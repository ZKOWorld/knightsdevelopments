<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero 3 — Editorial Collage</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:ital,opsz,wght@1,9..144,300;0,9..144,400&display=swap" rel="stylesheet">
<style>
  :root{--paper:#EDE7DE;--ink:#1A1A1A;--clay:#583939;--sage:#657B69}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Space Grotesk',sans-serif;background:var(--paper);color:var(--ink);overflow-x:hidden}
  em{font-family:'Fraunces',serif;font-style:italic;font-weight:300}
  .loader{position:fixed;inset:0;z-index:99;background:var(--ink);display:flex;align-items:center;justify-content:center;animation:lift 1s ease 1.4s forwards}
  .loader span{font-weight:700;letter-spacing:.4em;font-size:.9rem;color:var(--paper);opacity:0;animation:fade .8s ease .2s forwards}
  @keyframes fade{to{opacity:1}}@keyframes lift{to{transform:translateY(-100%)}}

  header{position:fixed;top:0;left:0;width:100%;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:1.6rem clamp(1.25rem,4vw,4rem)}
  .brand{font-weight:700;letter-spacing:.24em}
  nav{display:flex;gap:1.8rem;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase}

  .stage{position:relative;height:100svh;overflow:hidden}
  .head{position:absolute;z-index:10;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:100%;pointer-events:none;mix-blend-mode:multiply}
  .head h1{font-weight:700;text-transform:uppercase;font-size:clamp(2.6rem,11vw,11rem);line-height:.9}
  .head h1 em{text-transform:none;display:block}
  .head .ln{display:block;overflow:hidden}
  .head .ln span{display:block;transform:translateY(110%);animation:rise 1s cubic-bezier(.22,1,.36,1) forwards}
  .head .ln:nth-child(1) span{animation-delay:1.55s}.head .ln:nth-child(2) span{animation-delay:1.7s}
  @keyframes rise{to{transform:translateY(0)}}

  .pic{position:absolute;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.22);opacity:0;animation:pop 1.1s cubic-bezier(.22,1,.36,1) forwards}
  .pic img{width:100%;height:100%;object-fit:cover}
  @keyframes pop{from{opacity:0;transform:translateY(40px) scale(.96)}to{opacity:1;transform:none}}
  .p1{width:34vw;height:46vh;left:4vw;top:16vh;animation-delay:1.7s;z-index:5}
  .p2{width:26vw;height:38vh;right:5vw;top:12vh;animation-delay:1.85s;z-index:5}
  .p3{width:22vw;height:30vh;right:14vw;bottom:8vh;animation-delay:2s;z-index:15}
  .p4{width:18vw;height:26vh;left:14vw;bottom:7vh;animation-delay:2.15s;z-index:15}
  .cap{position:absolute;left:4vw;bottom:3vh;z-index:18;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--clay);opacity:0;animation:fade .8s ease 2.4s forwards}
  .scroll{position:absolute;left:50%;bottom:1.4rem;transform:translateX(-50%);z-index:18;font-size:.7rem;letter-spacing:.3em;color:var(--clay);opacity:0;animation:fade .8s 2.4s forwards}
  @media(max-width:820px){.head h1{font-size:14vw}.p2,.p4{display:none}.p1{width:60vw;height:34vh;top:20vh}.p3{width:46vw;height:26vh}}
</style>
</head>
<body>
  <div class="loader"><span>KNIGHTS DEVELOPMENTS</span></div>
  <header><div class="brand">KNIGHTS</div><nav><a>Projects</a><a>About</a><a>Contact</a></nav></header>

  <section class="stage" id="stage">
    <figure class="pic p1" data-depth="20"><img src="img/maplebrook.jpg" alt=""></figure>
    <figure class="pic p2" data-depth="-15"><img src="img/great-meadow.jpg" alt=""></figure>
    <figure class="pic p3" data-depth="30"><img src="img/huxley-hall.jpg" alt=""></figure>
    <figure class="pic p4" data-depth="-25"><img src="img/broadleaves.jpg" alt=""></figure>
    <div class="head"><h1><span class="ln"><span>Luxury living,</span></span><span class="ln"><span><em>by nature.</em></span></span></h1></div>
    <div class="cap">Fifteen developments · Buckinghamshire countryside</div>
    <div class="scroll">SCROLL</div>
  </section>

<script>
  const stage=document.getElementById('stage'), pics=[...document.querySelectorAll('.pic')];
  stage.addEventListener('mousemove',e=>{
    const cx=(e.clientX/window.innerWidth-.5), cy=(e.clientY/window.innerHeight-.5);
    pics.forEach(p=>{const d=+p.dataset.depth;p.style.transform='translate('+(cx*d)+'px,'+(cy*d)+'px)';});
  });
</script>
</body>
</html>
